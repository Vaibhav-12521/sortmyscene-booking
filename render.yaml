services:
  - type: web
    name: sortmyscene-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RESERVATION_TTL_MINUTES
        value: "10"
      - key: SEED_ON_START
        value: "true"
      - key: CLIENT_ORIGIN
        sync: false
